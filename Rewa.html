<div class="breaking-news">
  <div class="ticker-title">ब्रेकिंग न्यूज़</div>
  <div class="ticker-content" id="breakingNews"></div>
</div>

<script>
function toggleSearch() {
    const search = document.getElementById('searchNews');
    if (search.style.display === "block") {
        search.style.display = "none";
    } else {
        search.style.display = "block";
        search.focus();
    }
}
fetch('news.json')
  .then(res => res.json())
  .then(news => {
    const breaking = document.getElementById('breakingNews');
    news.filter(post => post.breaking).forEach(post => {
      breaking.innerHTML += `<span><b>• ${post.title}</b> </span>`;
    });
  });
</script>

<div style="display:flex; gap:20px;">

    <!-- Main news section -->
    <div style="flex:3">
        <div class="latest-news-section">
            <h2 class="section-title">समाचार</h2>
            <div class="news-container" id="newsContainer"></div>
        </div>
    </div>

    <!-- Latest news sidebar -->
    <div style="flex:1" class="latest-news">
        <h3>ताज़ा समाचार</h3>
        <ul id="latestNewsSidebar" style="list-style:none; padding:0;"></ul>
    </div>

</div>

<script>
const news = JSON.parse(localStorage.getItem('news')) || [];
const currentPage = 'Rewa'; // Change per page
const container = document.getElementById('newsContainer');
const sidebar = document.getElementById('latestNewsSidebar');

news.filter(post => post.page === currentPage).forEach(post => {
    // Add news card
    container.innerHTML += `
        <div class="news-card" id="news${post.id}">
            <div class="news-image"><img src="${post.image}" alt="${post.title}"></div>
            <div class="news-content">
                <h3>${post.title}</h3>
                <button class="read-btn" onclick="toggle(${post.id})">Read More</button>
                <div id="post${post.id}" class="news-extra">
                    <p>${post.description}</p>
                    <small><b>Author :</b> <i>${post.author}</i></small>
                </div>
            </div>
        </div>
    `;

    // Add to latest news sidebar
    sidebar.innerHTML += `<li style="margin-bottom:10px; cursor:pointer; color:#ff0000;" onclick="scrollToNews(${post.id})">${post.title}</li>`;
});

// Toggle description
function toggle(id){
    const el = document.getElementById('post'+id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

// Scroll to news card on clicking sidebar item
function scrollToNews(id){
    const newsEl = document.getElementById('news'+id);
    newsEl.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>

</body>
