<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload News</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
input, textarea, select, button { display: block; margin: 10px 0; padding: 8px; width: 300px; }
</style>
</head>
<body>

<h2>Upload News</h2>

<form id="newsForm">
    Title: <input type="text" id="title" required>
    Description: <textarea id="description" rows="5" required></textarea>
    Author: <input type="text" id="author" required>
    Page: 
    <select id="page">
        <option value="home">होम</option>
        <option value="taja-khabar">ताज़ा खबर</option>
        <option value="madhya pradesh">मध्य प्रदेश</option>
        <option value="vindhya">विंध्य</option>
        <option value="rewa">रीवा</option>
        <option value="satna">सतना</option>
        <option value="maihar">मैहर</option>
        <option value="seedhi">सीधी</option>
        <option value="maugang">मऊगंज</option>
        <option value="chattarpur">छतरपुर</option>
        <option value="panna">पन्ना</option>
        <option value="sahadol">शहडोल</option>
        <option value="rajneeti">राजनीति</option>
        <option value="crime">क्राइम</option>
    </select>
    Thumbnail: <input type="file" id="image" accept="image/*" required>
    <button type="submit">Upload</button>
</form>

<p id="message"></p>

<script>
document.getElementById('newsForm').addEventListener('submit', function(e){
    e.preventDefault();

    // Get form values
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    const author = document.getElementById('author').value;
    const page = document.getElementById('page').value;
    const imageFile = document.getElementById('image').files[0];

    if(!imageFile){
        alert("Please select an image!");
        return;
    }

    // Save the image to uploads/ using FileReader (only works locally, cannot auto-save to server)
    const reader = new FileReader();
    reader.onload = function(){
        const base64Image = reader.result; // This is your image in base64
        const newPost = {
            id: Date.now(),
            title,
            description,
            author,
            page,
            image: base64Image
        };

        // Load existing news.json from localStorage (for demo purposes)
        let news = JSON.parse(localStorage.getItem('news')) || [];
        news.push(newPost);
        localStorage.setItem('news', JSON.stringify(news));

        document.getElementById('message').innerText = "News uploaded successfully!";

        // Reset form
        document.getElementById('newsForm').reset();
    };
    reader.readAsDataURL(imageFile);
});
</script>

</body>
</html>
