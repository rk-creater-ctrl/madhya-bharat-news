<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body { font-family: Arial; background: #f4f4f7; padding: 50px; }
form { max-width: 400px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
input, select, button, textarea { width: 100%; margin: 10px 0; padding: 10px; }
button { background: #ff0000; color: #fff; border: none; cursor: pointer; }
button:hover { background: #cc0000; }
.post-container { max-width: 600px; margin: 20px auto; }
.post { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.post img { max-width: 100%; height: auto; border-radius: 5px; }
.delete-btn, .edit-btn { margin-top: 10px; }
.delete-btn { background: #555; }
.delete-btn:hover { background: #333; }
.edit-btn { background: #007bff; }
.edit-btn:hover { background: #0056b3; }
</style>
</head>
<body>

<h2 style="text-align:center;">Admin Login</h2>

<form id="loginForm">
    Username: <input type="text" id="username" required>
    Password: <input type="password" id="password" required>
    <button type="submit">Login</button>
</form>

<form id="postForm" style="display:none;">
    <h3>Create/Edit News Post</h3>
    Title: <input type="text" id="title" required>
    Description: <textarea id="description" rows="5" required></textarea>
    Author: <input type="text" id="author" required>
    Page:
    <select id="page">
        <option value="home">होम</option>
        <option value="taja-khabar">ताज़ा खबर</option>
        <option value="madhya pradesh">मध्य प्रदेश</option>
        <option value="vindhya">विंध्य</option>
        <option value="Rewa">रीवा</option>
        <option value="satna">सतना</option>
        <option value="maihar">मैहर</option>
        <option value="seedhi">सीधी</option>
        <option value="maugang">मऊगंज</option>
        <option value="chattarpur">छतरपुर</option>
        <option value="panna">पन्ना</option>
        <option value="sahadol">शहडोल</option>
        <option value="rajneeti">राजनीति</option>
        <option value="crime">क्राइम</option>
    </select>
    Thumbnail: <input type="file" id="image" accept="image/*">
    <button type="submit">Post</button>
</form>

<p id="msg" style="text-align:center; color:green;"></p>

<div class="post-container" id="postContainer"></div>

<script>
const adminUser = "admin";
const adminPass = "1234";

const loginForm = document.getElementById('loginForm');
const postForm = document.getElementById('postForm');
const msg = document.getElementById('msg');
const postContainer = document.getElementById('postContainer');

let editPostId = null; // Track if editing

// Login
loginForm.addEventListener('submit', e => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if(username === adminUser && password === adminPass){
        loginForm.style.display = "none";
        postForm.style.display = "block";
        msg.innerText = "Logged in successfully!";
        displayPosts();
    } else {
        alert("Invalid credentials!");
    }
});

// Display posts
function displayPosts() {
    let news = JSON.parse(localStorage.getItem('news')) || [];
    postContainer.innerHTML = "";
    news.forEach(post => {
        const postDiv = document.createElement('div');
        postDiv.className = "post";
        postDiv.innerHTML = `
            <h4>${post.title}</h4>
            <p><strong>Author:</strong> ${post.author} | <strong>Page:</strong> ${post.page}</p>
            <p>${post.description}</p>
            ${post.image ? `<img src="${post.image}">` : ""}
            <button class="edit-btn" onclick="editPost(${post.id})">Edit</button>
            <button class="delete-btn" onclick="deletePost(${post.id})">Delete</button>
        `;
        postContainer.appendChild(postDiv);
    });
}

// Delete post
function deletePost(id) {
    let news = JSON.parse(localStorage.getItem('news')) || [];
    news = news.filter(post => post.id !== id);
    localStorage.setItem('news', JSON.stringify(news));
    displayPosts();
}

// Edit post
function editPost(id) {
    let news = JSON.parse(localStorage.getItem('news')) || [];
    const post = news.find(p => p.id === id);
    if(post){
        document.getElementById('title').value = post.title;
        document.getElementById('description').value = post.description;
        document.getElementById('author').value = post.author;
        document.getElementById('page').value = post.page;
        editPostId = id; // set edit mode
    }
}

// Handle news posting
postForm.addEventListener('submit', e => {
    e.preventDefault();
    
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    const author = document.getElementById('author').value;
    const page = document.getElementById('page').value;
    const imageFile = document.getElementById('image').files[0];

    let news = JSON.parse(localStorage.getItem('news')) || [];

    const savePost = (imageBase64=null) => {
        if(editPostId){ 
            // Update existing
            news = news.map(post => {
                if(post.id === editPostId){
                    return {
                        ...post,
                        title,
                        description,
                        author,
                        page,
                        image: imageBase64 || post.image
                    }
                }
                return post;
            });
            localStorage.setItem('news', JSON.stringify(news));
            alert("Post updated successfully!");
        } else {
            // New post
            const newPost = {
                id: Date.now(),
                title,
                description,
                author,
                page,
                image: imageBase64 || ""
            };
            news.push(newPost);
            localStorage.setItem('news', JSON.stringify(news));
            alert("Post uploaded successfully!");
        }
        postForm.reset();
        editPostId = null;
        displayPosts();
    }

    if(imageFile){
        const reader = new FileReader();
        reader.onload = function(){
            savePost(reader.result);
        }
        reader.readAsDataURL(imageFile);
    } else {
        savePost();
    }
});
</script>

</body>
</html>
